<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>PCAF - Dashboard Server</title>
    <link rel="stylesheet" href="style.css"> </head>
<body style="background: #313338; color: white; font-family: sans-serif; padding: 40px;">

    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h1 id="db-title">Încărcare server...</h1>
        <a href="index.html" style="color: #949ba4; text-decoration: none;">← Înapoi la listă</a>
    </div>

    <hr style="border: 1px solid #444; margin: 20px 0;">

    <div id="loading">Se descarcă datele din baza de date...</div>

    <div id="content" style="display: none;">
        <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 20px;">
            
            <div style="background: #1e1f22; padding: 20px; border-radius: 8px;">
                <h3>⚙️ Configurare Facțiune</h3>
                <div id="config-data"></div>
            </div>

            <div style="background: #1e1f22; padding: 20px; border-radius: 8px;">
                <h3>👥 Listă Membri Activi</h3>
                <table style="width: 100%; border-collapse: collapse;">
                    <thead>
                        <tr style="text-align: left; border-bottom: 1px solid #444;">
                            <th style="padding: 10px;">Nume</th>
                            <th>Rank</th>
                            <th>FW</th>
                        </tr>
                    </thead>
                    <tbody id="members-table"></tbody>
                </table>
            </div>

        </div>
    </div>

    <script>
        const serverId = localStorage.getItem('selectedServerId');
const serverName = localStorage.getItem('selectedServerName');

// 1. Verificăm dacă avem un server selectat
if (!serverId) {
    window.location.href = 'index.html';
}

document.getElementById('db-title').innerText = `📊 Dashboard: ${serverName}`;

async function loadDashboard() {
    const loadingDiv = document.getElementById('loading');
    const contentDiv = document.getElementById('content');
    
    try {
        // 2. Cerere directă către Firebase (adăugăm .json la finalul URL-ului)
        const URL_FIREBASE = `https://pcaf-7f566-default-rtdb.europe-west1.firebasedatabase.app/servers/${serverId}.json`;
        console.log("Se încarcă datele de la:", URL_FIREBASE);

        const response = await fetch(URL_FIREBASE);
        // ... codul de fetch anterior ...
const data = await response.json();

if (data && data.membri_activi) {
    const tableBody = document.getElementById('members-table');
    tableBody.innerHTML = ''; 

    // 1. Transformăm obiectul în Array ca să îl putem sorta
    const listaMembri = Object.keys(data.membri_activi).map(id => {
        return {
            id: id,
            ...data.membri_activi[id]
        };
    });

    // 2. Sortăm lista după Zile (Descrescător: cei mai vechi primii)
    // Schimbă (b.Zile - a.Zile) în (a.Zile - b.Zile) dacă vrei invers
    listaMembri.sort((a, b) => {
        const zileA = parseInt(a.Zile) || 0;
        const zileB = parseInt(b.Zile) || 0;
        return zileB - zileA; 
    });

    // 3. Afișăm membrii sortați
    listaMembri.forEach(m => {
        tableBody.innerHTML += `
            <tr style="border-bottom: 1px solid #2b2d31; transition: 0.2s;" onmouseover="this.style.background='#2b2d31'" onmouseout="this.style.background='transparent'">
                <td style="padding: 12px;">
                    <div style="font-weight: bold; color: #fff;">${m.nume_joc || 'Jucător'}</div>
                </td>
                <td>
                    <span style="background: #5865f2; padding: 2px 8px; border-radius: 4px; font-size: 0.8rem;">
                        Rank ${m.rank || 1}
                    </span>
                </td>
                <td style="text-align: center;">
                    <b style="color: #f1c40f;">${m.zile_factiune || 0}</b> <small>zile</small>
                </td>
            </tr>
        `;
    });
}

        // Afișăm conținutul
        loadingDiv.style.display = 'none';
        contentDiv.style.display = 'block';

    } catch (error) {
        console.error("Eroare Firebase:", error);
        loadingDiv.innerHTML = "❌ Eroare la conectarea cu baza de date PCAF.";
    }
}

// Pornim încărcarea
loadDashboard();
    </script>
</body>
</html>
