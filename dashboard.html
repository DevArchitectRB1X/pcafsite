<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>PCAF - Dashboard Pro</title>
    <style>
        :root { --red-main: #ff4757; --bg-dark: #313338; --card-bg: #1e1f22; --text-gray: #b5bac1; }
        body { background: var(--bg-dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; }
        
        /* SIDEBAR STIL SCHITA TA */
        .sidebar { width: 260px; background: #111214; display: flex; flex-direction: column; padding: 20px; border-right: 1px solid #2b2d31; }
        .sidebar h2 { font-size: 1.2rem; margin-bottom: 30px; color: var(--red-main); text-align: center; }
        .nav-btn { 
            background: transparent; color: white; border: 1px solid var(--red-main); 
            padding: 12px; margin-bottom: 10px; border-radius: 5px; cursor: pointer; 
            text-align: left; font-weight: bold; transition: 0.3s;
        }
        .nav-btn:hover, .nav-btn.active { background: var(--red-main); color: white; }

        /* CONTINUT PRINCIPAL */
        .main-content { flex: 1; padding: 40px; overflow-y: auto; }
        .card { background: var(--card-bg); padding: 25px; border-radius: 10px; border: 1px solid #444; }
        
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; color: var(--text-gray); border-bottom: 2px solid #2b2d31; padding: 12px; }
        td { padding: 15px; border-bottom: 1px solid #2b2d31; }

        .btn-edit { background: #ffa502; color: black; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        
        /* MODAL PENTRU EDITARE */
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); }
        .modal-content { background: var(--card-bg); margin: 10% auto; padding: 30px; width: 400px; border-radius: 10px; border: 1px solid var(--red-main); }
        .modal-content input { width: 100%; padding: 10px; margin: 10px 0; background: #2b2d31; border: 1px solid #444; color: white; border-radius: 5px; }
        .save-btn { background: var(--red-main); color: white; border: none; padding: 10px 20px; width: 100%; cursor: pointer; font-weight: bold; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2 id="server-name-title">SERVER NAME</h2>
        <button class="nav-btn active">👥 Membri</button>
        <button class="nav-btn">⚙️ Configurare</button>
        <button class="nav-btn">📜 Loguri</button>
        <button class="nav-btn">📊 Statistici</button>
        <div style="margin-top: auto;">
            <a href="index.html" style="color: var(--text-gray); text-decoration: none; font-size: 0.9rem;">← Schimbă Serverul</a>
        </div>
    </div>

    <div class="main-content">
        <div id="loading">Se încarcă datele...</div>
        
        <div id="dashboard-view" style="display: none;">
            <div class="card">
                <h3 style="margin-top:0">Gestionare Membri</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Jucător</th>
                            <th>Rank</th>
                            <th>Vechime</th>
                            <th>Acțiuni</th>
                        </tr>
                    </thead>
                    <tbody id="members-table"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <h3 id="edit-title">Editează Jucător</h3>
            <input type="hidden" id="edit-id">
            <label>Nume Jucător:</label>
            <input type="text" id="edit-nume">
            <label>Rank (Număr):</label>
            <input type="number" id="edit-rank">
            <label>Zile (ex: 10 days):</label>
            <input type="text" id="edit-zile">
            <button class="save-btn" onclick="saveChanges()">Salvează în Firebase</button>
            <button style="background:transparent; color:gray; border:none; width:100%; margin-top:10px; cursor:pointer;" onclick="closeModal()">Anulează</button>
        </div>
    </div>

    <script>
        const serverId = localStorage.getItem('selectedServerId');
        const serverName = localStorage.getItem('selectedServerName');
        const FB_URL = "https://pcaf-7f566-default-rtdb.europe-west1.firebasedatabase.app";

        document.getElementById('server-name-title').innerText = serverName || "Dashboard";

        async function loadData() {
            try {
                const res = await fetch(`${FB_URL}/servers/${serverId}.json`);
                const data = await res.json();
                if(!data || !data.membri_activi) return;

                const table = document.getElementById('members-table');
                table.innerHTML = '';

                // Sortare (ca data trecută)
                const membriArr = Object.keys(data.membri_activi).map(id => ({ id, ...data.membri_activi[id] }));
                membriArr.sort((a,b) => (parseInt(b.Rank) || 0) - (parseInt(a.Rank) || 0));

                membriArr.forEach(m => {
                    table.innerHTML += `
                        <tr>
                            <td><b>${m.nume_joc}</b><br><small style="color:gray">${m.id}</small></td>
                            <td>Rank ${m.rank}</td>
                            <td>${m.zile_factiune}</td>
                            // <td>${m.FW}/3</td>
                            <td><button class="btn-edit" onclick="openEdit('${m.nume_joc}', '${m.rank}', '${m.zile_factiune}')">Edit</button></td>
                        </tr>`;
                });
                document.getElementById('loading').style.display = 'none';
                document.getElementById('dashboard-view').style.display = 'block';
            } catch (e) { console.error(e); }
        }

        // FUNCTII EDITARE
        function openEdit(nume_joc, rank, zile_factiune) {
            // document.getElementById('edit-id').value = id;
            document.getElementById('edit-nume').value = nume_joc;
            document.getElementById('edit-rank').value = rank;
            document.getElementById('edit-zile').value = zile_factiune;
           //  document.getElementById('edit-fw').value = fw;
            document.getElementById('editModal').style.display = 'block';
        }

        function closeModal() { document.getElementById('editModal').style.display = 'none'; }

        async function saveChanges() {
            // const id = document.getElementById('edit-id').value;
            const updatedData = {
                Nume: document.getElementById('edit-nume').value,
                Rank: document.getElementById('edit-rank').value,
                Zile: document.getElementById('edit-zile').value,
                // FW: document.getElementById('edit-fw').value
            };

            // Trimitere către Firebase (PATCH updatează doar câmpurile trimise)
            const res = await fetch(`${FB_URL}/servers/${serverId}/membri_activi/${id}.json`, {
                method: 'PATCH',
                body: JSON.stringify(updatedData)
            });

            if(res.ok) {
                alert("Salvat cu succes!");
                closeModal();
                loadData(); // Reîncărcăm tabelul
            } else {
                alert("Eroare la salvare!");
            }
        }

        loadData();
    </script>
</body>
</html>
