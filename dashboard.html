<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>PCAF - Dashboard Server</title>
    <link rel="stylesheet" href="style.css"> </head>
<body style="background: #313338; color: white; font-family: sans-serif; padding: 40px;">

    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h1 id="db-title">Încărcare server...</h1>
        <a href="index.html" style="color: #949ba4; text-decoration: none;">← Înapoi la listă</a>
    </div>

    <hr style="border: 1px solid #444; margin: 20px 0;">

    <div id="loading">Se descarcă datele din baza de date...</div>

    <div id="content" style="display: none;">
        <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 20px;">
            
            <div style="background: #1e1f22; padding: 20px; border-radius: 8px;">
                <h3>⚙️ Configurare Facțiune</h3>
                <div id="config-data"></div>
            </div>

            <div style="background: #1e1f22; padding: 20px; border-radius: 8px;">
                <h3>👥 Listă Membri Activi</h3>
                <table style="width: 100%; border-collapse: collapse;">
                    <thead>
                        <tr style="text-align: left; border-bottom: 1px solid #444;">
                            <th style="padding: 10px;">Nume</th>
                            <th>Rank</th>
                            <th>FW</th>
                        </tr>
                    </thead>
                    <tbody id="members-table"></tbody>
                </table>
            </div>

        </div>
    </div>

    <script>
        const serverId = localStorage.getItem('selectedServerId');
const serverName = localStorage.getItem('selectedServerName');

// 1. Verificăm dacă avem un server selectat
if (!serverId) {
    window.location.href = 'index.html';
}

document.getElementById('db-title').innerText = `📊 Dashboard: ${serverName}`;

async function loadDashboard() {
    const loadingDiv = document.getElementById('loading');
    const contentDiv = document.getElementById('content');
    
    try {
        // 2. Cerere directă către Firebase (adăugăm .json la finalul URL-ului)
        const URL_FIREBASE = `https://pcaf-7f566-default-rtdb.europe-west1.firebasedatabase.app/servers/${serverId}.json`;
        console.log("Se încarcă datele de la:", URL_FIREBASE);

        const response = await fetch(URL_FIREBASE);
        const data = await response.json();

        // 3. Verificăm dacă serverul există în DB
        if (!data) {
            loadingDiv.innerHTML = `
                <div style="color: #e74c3c; background: rgba(231, 76, 60, 0.1); padding: 20px; border-radius: 8px; border: 1px solid #e74c3c;">
                    ❌ Serverul <b>${serverName}</b> nu a fost găsit în baza de date PCAF.<br>
                    <small>Asigură-te că ai folosit <code>/activate</code> pe Discord.</small>
                </div>`;
            return;
        }

        // 4. Afișăm Configurația (Conform structurii tale din JSON)
        const configBox = document.getElementById('config-data');
        // Folosim optional chaining (?.) pentru a evita erorile dacă un nod lipsește
        configBox.innerHTML = `
            <p>🏷️ Tag: <b>${data.Configurare?.Tag || 'Nesetat'}</b></p>
            <p>👥 Sloturi: <b>${data.Configurare?.MaxMembri || '0'}</b></p>
            <p>📺 Canal Anunțuri: <span style="color: #5865F2;">#${data.Configurare?.Canale?.Anunturi || 'Nespecificat'}</span></p>
        `;

        // 5. Generăm Tabelul de Membri
        const tableBody = document.getElementById('members-table');
        tableBody.innerHTML = ''; // Curățăm tabelul

        if (data.membri_activi) {
            // Transformăm obiectul de membri într-o listă pentru a o parcurge
            Object.keys(data.membri_activi).forEach(memberId => {
                const m = data.membri_activi[memberId];
                tableBody.innerHTML += `
                    <tr style="border-bottom: 1px solid #2b2d31;">
                        <td style="padding: 12px;">${m.Nume || 'Jucător Necunoscut'}</td>
                        <td>Rank ${m.Rank || '1'}</td>
                        <td style="color: ${m.FW >= 2 ? '#e74c3c' : '#2ecc71'}; font-weight: bold;">
                            ${m.FW || 0}/3
                        </td>
                    </tr>
                `;
            });
        } else {
            tableBody.innerHTML = '<tr><td colspan="3" style="text-align:center; padding: 20px;">Niciun membru înregistrat în facțiune.</td></tr>';
        }

        // Afișăm conținutul
        loadingDiv.style.display = 'none';
        contentDiv.style.display = 'block';

    } catch (error) {
        console.error("Eroare Firebase:", error);
        loadingDiv.innerHTML = "❌ Eroare la conectarea cu baza de date PCAF.";
    }
}

// Pornim încărcarea
loadDashboard();
    </script>
</body>
</html>
