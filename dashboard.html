<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>PCAF - Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background: #313338; color: white; font-family: sans-serif; padding: 40px;">

    <div style="display: flex; justify-content: space-between; align-items: center; max-width: 1000px; margin: 0 auto;">
        <h1 id="db-title">Se încarcă...</h1>
        <a href="index.html" style="color: #949ba4; text-decoration: none; background: #1e1f22; padding: 8px 15px; border-radius: 5px; border: 1px solid #444;">← Înapoi</a>
    </div>

    <div id="loading" style="text-align: center; margin-top: 50px;">
        <h3>Se preiau datele din Firebase...</h3>
    </div>

    <div id="content" style="display: none; max-width: 1000px; margin: 30px auto auto;">
        <div style="background: #1e1f22; padding: 25px; border-radius: 10px; border: 1px solid #444;">
            <h3 style="border-bottom: 1px solid #444; padding-bottom: 10px; margin-top: 0;">👥 Evidență Membri (Sortat după Zile)</h3>
            
            <table style="width: 100%; border-collapse: collapse; margin-top: 15px;">
                <thead>
                    <tr style="text-align: left; color: #949ba4; border-bottom: 2px solid #2b2d31;">
                        <th style="padding: 12px;">NUME JUCĂTOR</th>
                        <th>RANK</th>
                        <th style="text-align: center;">VECHIME</th>
                        <th style="text-align: center;">SANCȚIUNI</th>
                    </tr>
                </thead>
                <tbody id="members-table"></tbody>
            </table>
        </div>
    </div>

    <script>
        const serverId = localStorage.getItem('selectedServerId');
const serverName = localStorage.getItem('selectedServerName');
const FIREBASE_BASE_URL = "https://pcaf-7f566-default-rtdb.europe-west1.firebasedatabase.app";

if (!serverId) window.location.href = 'index.html';
document.getElementById('db-title').innerText = `📊 Dashboard: ${serverName}`;

async function loadDashboard() {
    try {
        const response = await fetch(`${FIREBASE_BASE_URL}/servers/${serverId}.json`);
        let data = await response.json();

        // Dacă datele nu sunt direct în rădăcină, verificăm sub-nodul 'servers'
        if (!data) {
            const retry = await fetch(`${FIREBASE_BASE_URL}/servers/${serverId}.json`);
            data = await retry.json();
        }

        if (!data || !data.Membri) {
            document.getElementById('loading').innerHTML = "❌ Nu s-au găsit membri în baza de date.";
            return;
        }

        // 1. Transformăm obiectul Firebase în Listă
        const listaMembri = Object.keys(data.Membri).map(id => {
            return {
                id: id,
                ...data.Membri[id]
            };
        });

        // 2. FUNCȚIA DE SORTARE (Rank + Zile)
        listaMembri.sort((a, b) => {
            // Curățăm Zilele (scoatem doar numărul din "13 days")
            const getZile = (val) => parseInt(val?.toString().replace(/[^0-9]/g, '')) || 0;
            // Curățăm Rank-ul (scoatem doar numărul din "Rank 4")
            const getRank = (val) => parseInt(val?.toString().replace(/[^0-9]/g, '')) || 0;

            const rankA = getRank(a.rank);
            const rankB = getRank(b.rank);
            const zileA = getZile(a.zile_factiune);
            const zileB = getZile(b.zile_factiune);

            // PRIORITATE 1: Rank (Cei cu rank mai mare sus)
            if (rankB !== rankA) {
                return rankB - rankA;
            }
            // PRIORITATE 2: Zile (Dacă au același rank, cel mai vechi e sus)
            return zileB - zileA;
        });

        // 3. Afișare în Tabel
        const table = document.getElementById('members-table');
        table.innerHTML = '';
        
        listaMembri.forEach(m => {
            // Calculăm culoarea în funcție de FW
            const fwColor = m.FW >= 2 ? '#ff4757' : (m.FW == 1 ? '#ffa502' : '#2ed573');
            
            table.innerHTML += `
                <tr style="border-bottom: 1px solid #2b2d31; height: 60px;">
                    <td style="padding: 10px;">
                        <div style="font-weight: bold; color: white;">${m.nume_joc || 'Jucător'}</div>
                    </td>
                    <td>
                        <span style="background: #5865f2; padding: 4px 10px; border-radius: 5px; font-size: 0.85rem; font-weight: bold;">
                            Rank ${m.rank || 1}
                        </span>
                    </td>
                    <td style="text-align: center;">
                        <span style="color: #f1c40f; font-weight: bold;">${m.zile_factiune || '0 days'}</span>
                    </td>
                    <td style="text-align: center;">
                        <span style="color: ${fwColor}; font-weight: bold; border: 1px solid ${fwColor}; padding: 2px 8px; border-radius: 4px;">
                            ${m.FW || 0}/3 FW
                        </span>
                    </td>
                </tr>
            `;
        });

        document.getElementById('loading').style.display = 'none';
        document.getElementById('content').style.display = 'block';

    } catch (err) {
        console.error(err);
        document.getElementById('loading').innerText = "❌ Eroare tehnică la încărcare.";
    }
}

loadDashboard();
    </script>
</body>
</html>
