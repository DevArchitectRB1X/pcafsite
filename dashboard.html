<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>PCAF - Dashboard</title>
    <style>
        body { background: #313338; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 40px; margin: 0; }
        .container { max-width: 1000px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .back-btn { color: #949ba4; text-decoration: none; background: #1e1f22; padding: 8px 15px; border-radius: 5px; border: 1px solid #444; transition: 0.3s; }
        .back-btn:hover { background: #2b2d31; color: white; }
        .card { background: #1e1f22; padding: 25px; border-radius: 10px; border: 1px solid #444; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; color: #949ba4; border-bottom: 2px solid #2b2d31; padding: 12px; font-size: 0.85rem; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid #2b2d31; }
        .rank-badge { background: #5865f2; padding: 4px 10px; border-radius: 5px; font-size: 0.85rem; font-weight: bold; }
        .fw-badge { padding: 3px 10px; border-radius: 4px; font-weight: bold; font-size: 0.9rem; border: 1px solid; }
        .days-text { color: #f1c40f; font-weight: bold; }
        #loading { text-align: center; margin-top: 100px; font-size: 1.2rem; color: #b5bac1; }
    </style></head>
<body>

    <div class="container">
        <div class="header">
            <h1 id="db-title">Se încarcă...</h1>
            <a href="index.html" class="back-btn">← Înapoi la servere</a>
        </div>

        <div id="loading">🔍 Căutăm datele în baza de date PCAF...</div>

        <div id="content" style="display: none;">
            <div class="card">
                <h3>👥 Evidență Membri (Sortat: Rank & Zile)</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Membru</th>
                            <th>Grad / Rank</th>
                            <th style="text-align: center;">Vechime</th>
                            <th style="text-align: center;">Sancțiuni</th>
                        </tr>
                    </thead>
                    <tbody id="members-table"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const serverId = localStorage.getItem('selectedServerId');
        const serverName = localStorage.getItem('selectedServerName');
        // URL-ul tău exact din Firebase
        const FIREBASE_BASE_URL = "https://pcaf-7f566-default-rtdb.europe-west1.firebasedatabase.app";

        if (!serverId) window.location.href = 'index.html';
        document.getElementById('db-title').innerText = `📊 Dashboard: ${serverName}`;

        async function loadDashboard() {
            try {
                // Încercăm prima dată în nodul /servers/ID (cum e în JSON-ul tău)
                let response = await fetch(`${FIREBASE_BASE_URL}/servers/${serverId}.json`);
                let data = await response.json();

                // Dacă nu găsește, încercăm direct pe /ID
                if (!data) {
                    console.log("Nu am găsit în /servers/, încercăm direct...");
                    response = await fetch(`${FIREBASE_BASE_URL}/${serverId}.json`);
                    data = await response.json();
                }

                if (!data || !data.membri_activi) {
                    document.getElementById('loading').innerHTML = `
                        <div style="background: rgba(231, 76, 60, 0.1); border: 1px solid #e74c3c; padding: 20px; border-radius: 8px;">
                            ❌ Nu s-au găsit membri pentru ID-ul <b>${serverId}</b>.<br>
                            <small>Asigură-te că botul a salvat datele sub acest ID în Firebase.</small>
                        </div>`;
                    return;
                }

                // 1. Transformăm obiectul Firebase într-o Listă (Array)
                const listaMembri = Object.keys(data.membri_activi).map(id => ({
                    id: id,
                    ...data.membri_activi[id]
                }));

                // 2. LOGICA DE SORTARE
                listaMembri.sort((a, b) => {
                    // Extragem cifrele din "Rank 4" sau "4"
                    const getRank = (v) => parseInt(v?.toString().replace(/[^0-9]/g, '')) || 0;
                    // Extragem cifrele din "13 days" sau "13"
                    const getZile = (v) => parseInt(v?.toString().replace(/[^0-9]/g, '')) || 0;

                    const rA = getRank(a.rank);
                    const rB = getRank(b.rank);
                    const zA = getZile(a.zile_factiune);
                    const zB = getZile(b.zile_factiune);

                    // Mai întâi după Rank (Descrescător)
                    if (rB !== rA) return rB - rA;
                    // Dacă au același rank, după Zile (Descrescător)
                    return zB - zA;
                });

                // 3. Generăm rândurile în tabel
                const table = document.getElementById('members-table');
                table.innerHTML = '';
                
                listaMembri.forEach(m => {
                    const fw = parseInt(m.FW) || 0;
                    const fwColor = fw >= 2 ? '#ff4757' : (fw === 1 ? '#ffa502' : '#2ed573');
                    
                    table.innerHTML += `
                        <tr>
                            <td>
                                <div style="font-weight: bold;">${m.nume_joc || 'Jucător'}</div>
                                <div style="font-size: 0.75rem; color: #72767d;">ID: ${m.id}</div>
                            </td>
                            <td><span class="rank-badge">Rank ${m.rank || 1}</span></td>
                            <td style="text-align: center;"><span class="days-text">${m.zile_factiune || '0 days'}</span></td>
                            <td style="text-align: center;">
                                <span class="fw-badge" style="color: ${fwColor}; border-color: ${fwColor};">
                                    ${fw}/3 FW
                                </span>
                            </td>
                        </tr>
                    `;
                });

                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';

            } catch (err) {
                console.error("Eroare:", err);
                document.getElementById('loading').innerText = "❌ Eroare tehnică la conectarea cu Firebase.";
            }
        }

        loadDashboard();
    </script>
</body>
</html>
